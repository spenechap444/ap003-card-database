name: Deploy DB host (CLI)

on: workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          #  Replace ACCOUNT ID if different (must be 12 digits, no dashes)
          role-to-assume: arn:aws:iam::848167604595:role/GitHubOIDCDeployRole
          aws-region: us-east-1

      - name: Upsert DB password in SSM (optional)
        if: secrets.DB_PASS != ''
        run: |
          aws ssm put-parameter \
            --name "/dev/db/primary/password" \
            --type SecureString \
            --value "${{ secrets.DB_PASS }}" \
            --overwrite

      - name: Create IAM role + instance profile (idempotent-ish)
        run: |
          set -euo pipefail
          ROLE_NAME="ec2-ssm-reader"
          PROFILE_NAME="ec2-ssm-reader-profile"

          # Restrict to exactly your parameter
          POLICY_DOC='{
            "Version":"2012-10-17",
            "Statement":[
              {
                "Effect":"Allow",
                "Action":["ssm:GetParameter"],
                "Resource":"arn:aws:ssm:us-east-1:848167604595:parameter/dev/db/primary/password"
              }
            ]
          }'

          TRUST_DOC='{
            "Version":"2012-10-17",
            "Statement":[
              {
                "Effect":"Allow",
                "Principal":{"Service":"ec2.amazonaws.com"},
                "Action":"sts:AssumeRole"
              }
            ]
          }'

          aws iam create-role \
            --role-name "$ROLE_NAME" \
            --assume-role-policy-document "$TRUST_DOC" \
            >/dev/null 2>&1 || true

          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name ReadDbSecret \
            --policy-document "$POLICY_DOC"

          aws iam create-instance-profile \
            --instance-profile-name "$PROFILE_NAME" \
            >/dev/null 2>&1 || true

          aws iam add-role-to-instance-profile \
            --instance-profile-name "$PROFILE_NAME" \
            --role-name "$ROLE_NAME" \
            >/dev/null 2>&1 || true

      - name: Launch EC2 with separate 80GB data volume (Option B)
        run: |
          set -euo pipefail

          # ====== Your values ======
          AMI_ID="ami-004d0c9c98bf36c88"
          SG_ID="sg-06f7ddb3987f70f24"
          SUBNET_ID="subnet-04afa62a0e03471b4"
          INSTANCE_PROFILE_NAME="ec2-ssm-reader-profile"
          # =========================

          # Load your cloud-init from repo (expects ./.infra/user-data.yaml)
          USERDATA_B64=$(base64 -w0 ./.infra/user-data.yaml)

          # Two EBS volumes:
          # - /dev/sda1 : root 20GB gp3
          # - /dev/sdf  : data 80GB gp3 (your bootstrap will format/mount to /var/lib/postgresql)
          BDMS='[
            {
              "DeviceName": "/dev/sda1",
              "Ebs": {
                "VolumeSize": 20,
                "VolumeType": "gp3",
                "DeleteOnTermination": true,
                "Encrypted": true
              }
            },
            {
              "DeviceName": "/dev/sdf",
              "Ebs": {
                "VolumeSize": 80,
                "VolumeType": "gp3",
                "DeleteOnTermination": true,
                "Encrypted": true
              }
            }
          ]'

          INSTANCE_ID=$(
            aws ec2 run-instances \
              --image-id "$AMI_ID" \
              --instance-type t3.small \
              --iam-instance-profile Name="$INSTANCE_PROFILE_NAME" \
              --security-group-ids "$SG_ID" \
              --subnet-id "$SUBNET_ID" \
              --user-data "$USERDATA_B64" \
              --block-device-mappings "$BDMS" \
              --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=postgres-db}]' \
              --count 1 \
              --query 'Instances[0].InstanceId' \
              --output text
          )

          echo "Launched instance: ${INSTANCE_ID}"
          echo "Tip: on Nitro instances /dev/sdf appears as /dev/xvdf (or nvme1n1). Your bootstrap handles this."
