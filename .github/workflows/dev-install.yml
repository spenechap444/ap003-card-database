name: Deploy DB SQL (EC2 via SSM, no S3)

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "Target EC2 InstanceId (running with SSM + Postgres)"
        required: true
        type: string
      db_name:
        description: "Target database name"
        required: true
        type: string
      email_to:
        description: "Email address for the deployment log"
        required: true
        type: string
      

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::848167604595:role/GitHubOIDCDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Package SQL files
        run: |
          mkdir -p build
          tar -czf build/sql-bundle.tgz master.sql sql/
          ls -lh build/sql-bundle.tgz

      - name: Copy SQL bundle to EC2 via SSM
        run: |
          set -euo pipefail
          TS=$(date +%Y%m%d-%H%M%S)
          echo "TS=$TS" >> $GITHUB_ENV

          # Use SSM to copy tarball
          aws ssm send-command \
            --instance-ids "${{ inputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=$'mkdir -p /opt/app/sql' \
            --comment "Prepare SQL directory"

          # Use SSM 'send-command' with file upload feature (Base64 encoded)
          # The upload is simulated by encoding the tarball and decoding on the instance
          base64 build/sql-bundle.tgz > build/sql-bundle.b64

          echo "Uploading bundle via SSM (this may take a moment)..."
          aws ssm send-command \
            --instance-ids "${{ inputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=$'echo "${BUNDLE}" | base64 -d > /opt/app/sql/sql-bundle.tgz' \
            --cli-input-json "$(jq -n --arg BUNDLE "$(cat build/sql-bundle.b64)" \
              '{Parameters:{commands:["echo \($BUNDLE) | base64 -d > /opt/app/sql/sql-bundle.tgz"]}}')" \
            > /dev/null

          rm build/sql-bundle.b64

      - name: Execute master.sql via SSM
        id: exec
        run: |
          set -euo pipefail
          TS="${{ env.TS }}"
          LOG_FILE="/var/log/db-deploy-${TS}.log"

          COMMAND=$'set -euo pipefail
          mkdir -p /opt/app/sql
          cd /opt/app/sql
          tar -xzf sql-bundle.tgz
          chown -R postgres:postgres /opt/app/sql
          sudo -u postgres psql -v ON_ERROR_STOP=1 -d '"${{ inputs.db_name }}"' -f /opt/app/sql/master.sql \
            > '"$LOG_FILE"' 2>&1
          tail -n 40 "$LOG_FILE"
          cat "$LOG_FILE"
          '

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ inputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="$COMMAND" \
            --query "Command.CommandId" \
            --output text)

          echo "CMD_ID=$CMD_ID" >> $GITHUB_ENV

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ inputs.instance_id }}"

          # Pull log back to runner
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ inputs.instance_id }}" \
            --query "StandardOutputContent" \
            --output text > build/db-deploy-${TS}.log || true

          echo "LOG_PATH=build/db-deploy-${TS}.log" >> $GITHUB_ENV
          tail -n 20 build/db-deploy-${TS}.log || true

      - name: Upload deploy log artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-deploy-log-${{ env.TS }}
          path: ${{ env.LOG_PATH }}

      - name: Email the deploy log
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "DB Deploy log ${{ env.TS }} - ${{ inputs.instance_id }}"
          to: ${{ inputs.email_to }}
          from: "DB Deploy Bot <${{ secrets.SMTP_FROM }}>"
          body: |
            Hi,

            The PostgreSQL master.sql deployment has completed on:
            - Instance: ${{ inputs.instance_id }}
            - Database: ${{ inputs.db_name }}
            - Timestamp: ${{ env.TS }}

            The full log is attached.

            – GitHub Actions
          attachments: ${{ env.LOG_PATH }}
